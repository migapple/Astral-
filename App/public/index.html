.main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }

.setup-input::placeholder { color: var(--muted); }
.setup-row { display: flex; gap: 10px; width: 100%; }
.setup-row .setup-input { flex: 1; }
.btn-gold { width: 100%; background: var(--gold); color: var(--ink); border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Cormorant Garamond', serif; letter-spacing: 0.5px; margin-top: 4px; }

.card { background: var(--ink2); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: calc(11px * var(--fs)); color: var(--gold); letter-spacing: 1px; margin-bottom: 10px; }

/* SIGNE SOLAIRE */

/* ══ ASTRO CALCULATIONS (simplified) ══ */
function getSunSignIndex(month, day) {
  const dates = [[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22],[12,22],[1,20],[2,19]];
  for (let i = 0; i < 12; i++) {
    const [m, d] = dates[i];
    const [nm, nd] = dates[(i + 1) % 12];
    if (month === m && day >= d) return i;
    if (month === nm && day < nd) return i;
  }
  return 0;
}

function getMoonSignIndex(year, month, day) {
  // Simplified: moon moves ~1 sign every 2.5 days
  const jd = Math.floor(365.25 * year) + Math.floor(30.6 * month) + day;
  return Math.abs(jd * 3 + 7) % 12;
}

function getAscendantIndex(hour, minute, sunIdx) {
  // Simplified: ascendant based on birth hour (changes ~2h per sign)
  const totalHours = hour + minute / 60;
  return Math.floor((sunIdx * 2 + totalHours / 2) % 12);
}

function getPlanetPositions(year, month, day, sunIdx) {
  const seed = year * 13 + month * 7 + day;
  const planets = ['mercury', 'venus', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune', 'pluto'];
  const periods = [0.24, 0.62, 1.88, 11.86, 29.46, 84.01, 164.8, 248.09];
  const result = { sun: sunIdx };
  planets.forEach((p, i) => {
    result[p] = Math.floor((seed / periods[i] * 3.7 + i * 1.618) % 12);
  });
  result.moon = getMoonSignIndex(year, month, day);
  return result;
}

function getHouseSigns(ascIdx) {
  return Array.from({length: 12}, (_, i) => (ascIdx + i) % 12);
}

  if (!dob) return;
  const [year, month, day] = dob.split('-').map(Number);
  const [hour, minute] = time.split(':').map(Number);
  const sunIdx = getSunSignIndex(month, day);
  const planets = getPlanetPositions(year, month, day, sunIdx);
  const ascIdx = getAscendantIndex(hour, minute, sunIdx);
  planets.ascendant = ascIdx;
  profile = { dob, time, city, year, month, day, hour, minute, sunIdx, ascIdx, planets };
  localStorage.setItem('ac_profile', JSON.stringify(profile));
  document.getElementById('setup-screen').style.display = 'none';
  showTab('theme');
}

function updateLangUI() {
  const t = T[lang];
  document.getElementById('appTitle').textContent = t.appTitle;
  document.getElementById('tab1-lbl').textContent = t.tab1;
  document.getElementById('tab2-lbl').textContent = t.tab2;
  document.getElementById('tab3-lbl').textContent = t.tab3;
  document.getElementById('langBtn').textContent = lang === 'fr' ? '🇫🇷' : '🇬🇧';
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  localStorage.setItem('ac_lang', lang);
  updateLangUI();
  showTab(currentTab);
}

function showTab(tab) {
  currentTab = tab;
  ['theme','planetes','compat','settings'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === tab);
  });
  const mc = document.getElementById('main-content');
  const t = T[lang];
  if (tab === 'theme') renderTheme(mc, t);
  else if (tab === 'planetes') renderPlanetes(mc, t);
  else if (tab === 'compat') renderCompat(mc, t);
  else renderSettings(mc, t);
}

/* ══ TAB: THÈME ══ */
function renderTheme(mc, t) {
  if (!profile) return;
  const sign = SIGNS[profile.sunIdx];
  const moonSign = SIGNS[profile.planets.moon];
  const ascSign = SIGNS[profile.ascIdx];
  const signName = lang === 'fr' ? sign.fr : sign.en;
  const moonName = lang === 'fr' ? moonSign.fr : moonSign.en;
  const ascName = lang === 'fr' ? ascSign.fr : ascSign.en;
  const elem = t.elements[sign.elem];
  const qual = t.qualities[sign.qual];
  const desc = lang === 'fr' ? SIGN_DESC_FR[profile.sunIdx] : SIGN_DESC_EN[profile.sunIdx];

  mc.innerHTML = `
    <div class="sun-sign-card">
      <div class="sign-glyph">${sign.glyph}</div>
      <div class="sign-info">
        <h2>${signName}</h2>
        <div class="sign-dates">${sign.dates}</div>
        <div class="sign-elem">${elem} · ${qual} · ${sign.ruler}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">${t.wheel}</div>
      <canvas id="wheel-canvas"></canvas>
    </div>

    <div class="card">
      <div class="card-title">${t.descriptions}</div>
      <div class="desc-item">
        <div class="desc-label">${sign.glyph} ${t.sunSign} — ${signName}</div>
        <div class="desc-text">${desc}</div>
      </div>
      <div class="desc-item">
        <div class="desc-label">☽ ${t.moonSign} — ${moonName}</div>
        <div class="desc-text">${lang === 'fr' ? SIGN_DESC_FR[profile.planets.moon] : SIGN_DESC_EN[profile.planets.moon]}</div>
      </div>
      <div class="desc-item">
        <div class="desc-label">↑ ${t.ascendant} — ${ascName}</div>
        <div class="desc-text">${lang === 'fr' ? SIGN_DESC_FR[profile.ascIdx] : SIGN_DESC_EN[profile.ascIdx]}</div>
      </div>
    </div>
  `;
  setTimeout(() => drawWheel(t), 80);
}

function drawWheel(t) {
  const canvas = document.getElementById('wheel-canvas');
  if (!canvas || !profile) return;
  const dpr = window.devicePixelRatio || 2;
  const size = canvas.offsetWidth;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = size / 2, cy = size / 2;
  const R = size / 2 - 8;

  // background
  ctx.fillStyle = '#0f0c1a';
  ctx.fillRect(0, 0, size, size);

  // outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#d4af3760';
  ctx.lineWidth = 1;
  ctx.stroke();

  // inner rings
  [0.75, 0.55, 0.35].forEach(r => {
    ctx.beginPath();
    ctx.arc(cx, cy, R * r, 0, Math.PI * 2);
    ctx.strokeStyle = '#2a2040';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // 12 sign segments
  SIGNS.forEach((sign, i) => {
    const startAngle = (i * 30 - 90) * Math.PI / 180;
    const endAngle = ((i + 1) * 30 - 90) * Math.PI / 180;
    const midAngle = (startAngle + endAngle) / 2;

    // segment line
    ctx.beginPath();
    ctx.moveTo(cx + R * 0.75 * Math.cos(startAngle), cy + R * 0.75 * Math.sin(startAngle));
    ctx.lineTo(cx + R * Math.cos(startAngle), cy + R * Math.sin(startAngle));
    ctx.strokeStyle = '#3a3060';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // sign glyph
    const glyphR = R * 0.875;
    const gx = cx + glyphR * Math.cos(midAngle);
    const gy = cy + glyphR * Math.sin(midAngle);
    ctx.fillStyle = i === profile.sunIdx ? '#d4af37' : '#6a5080';
    ctx.font = `${Math.round(size * 0.045)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sign.glyph, gx, gy);
  });

  // house lines
  const houses = getHouseSigns(profile.ascIdx);
  houses.forEach((_, i) => {
    const angle = (profile.ascIdx * 30 + i * 30 - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx + R * 0.35 * Math.cos(angle), cy + R * 0.35 * Math.sin(angle));
    ctx.lineTo(cx + R * 0.55 * Math.cos(angle), cy + R * 0.55 * Math.sin(angle));
    ctx.strokeStyle = '#d4af3740';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // planets
  const planetKeys = ['sun', 'moon', 'mercury', 'venus', 'mars', 'jupiter', 'saturn'];
  planetKeys.forEach((key, pi) => {
    const signIdx = profile.planets[key];
    if (signIdx === undefined) return;
    const baseAngle = (signIdx * 30 - 90) * Math.PI / 180;
    const offset = (pi % 3) * 8 * Math.PI / 180;
    const angle = baseAngle + 15 * Math.PI / 180 + offset;
    const pr = R * (0.42 + (pi % 2) * 0.06);
    const px = cx + pr * Math.cos(angle);
    const py = cy + pr * Math.sin(angle);

    // planet dot
    ctx.beginPath();
    ctx.arc(px, py, size * 0.022, 0, Math.PI * 2);
    ctx.fillStyle = PLANET_COLORS[key] + '40';
    ctx.fill();
    ctx.strokeStyle = PLANET_COLORS[key];
    ctx.lineWidth = 1;
    ctx.stroke();

    // planet glyph
    ctx.fillStyle = PLANET_COLORS[key];
    ctx.font = `${Math.round(size * 0.038)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PLANET_GLYPHS[key], px, py);
  });

  // center
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.12, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1530';
  ctx.fill();
  ctx.strokeStyle = '#d4af3760';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // ASC label
  const ascAngle = (profile.ascIdx * 30 - 90) * Math.PI / 180;
  const ax = cx + R * 0.64 * Math.cos(ascAngle);
  const ay = cy + R * 0.64 * Math.sin(ascAngle);
  ctx.fillStyle = '#d4af37';
  ctx.font = `bold ${Math.round(size * 0.03)}px 'Cormorant Garamond', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ASC', ax, ay);
}

/* ══ TAB: PLANÈTES ══ */
function renderPlanetes(mc, t) {
  if (!profile) return;
  const planetOrder = ['sun', 'moon', 'mercury', 'venus', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune', 'pluto'];
  const hSigns = getHouseSigns(profile.ascIdx);

  const planetsHTML = planetOrder.map(key => {
    const signIdx = profile.planets[key];
    const sign = SIGNS[signIdx];
    const signName = lang === 'fr' ? sign.fr : sign.en;
    const pName = t.planetNames[key];
    return `
      <div class="planet-row">
        <div class="planet-left">
          <div class="planet-sym" style="color:${PLANET_COLORS[key]}">${PLANET_GLYPHS[key]}</div>
          <div class="planet-name">${pName}</div>
        </div>
        <div class="planet-sign"><span class="planet-glyph">${sign.glyph}</span>${signName}</div>
      </div>`;
  }).join('');

  const housesHTML = hSigns.map((signIdx, i) => {
    const sign = SIGNS[signIdx];
    return `
      <div class="house-item">
        <div class="house-num">${t.houseNames[i].toUpperCase()}</div>
        <div class="house-sign">${sign.glyph} ${lang === 'fr' ? sign.fr : sign.en}</div>
        <div class="house-meaning">${t.houseMeanings[i]}</div>
      </div>`;
  }).join('');

  mc.innerHTML = `
    <div class="card">
      <div class="card-title">${t.planets}</div>
      ${planetsHTML}
    </div>
    <div class="card">
      <div class="card-title">${t.houses}</div>
      <div class="house-grid">${housesHTML}</div>
    </div>
  `;
}

/* ══ TAB: COMPATIBILITÉ ══ */
function renderCompat(mc, t) {
  if (!profile) return;
  const myIdx = profile.sunIdx;
  const scores = COMPAT[myIdx];
  const items = SIGNS.map((sign, i) => {
    const sc = scores[i];
    const cls = sc === 3 ? 'compat-high' : sc === 2 ? 'compat-mid' : 'compat-low';
    const stars = sc === 3 ? '★★★' : sc === 2 ? '★★☆' : '★☆☆';
    const name = lang === 'fr' ? sign.fr : sign.en;
    return `
      <div class="compat-item">
        <div class="compat-glyph">${sign.glyph}</div>
        <div class="compat-name">${name}</div>
        <div class="compat-score ${cls}">${stars}</div>
      </div>`;
  }).join('');

  mc.innerHTML = `
    <div class="card">
      <div class="card-title">${t.compatibility}</div>
      <div class="compat-grid">${items}</div>
    </div>
  `;
}

function renderAppsGrid() {
  const grid = document.getElementById('apps-grid');
  if (!grid || grid.childElementCount > 0) return;
  APPS.forEach(app => {
    const item = document.createElement('div');
    item.className = 'app-icon-item';
    item.onclick = () => openExt('https://apps.apple.com/app/id' + app.id);
    const img = document.createElement('img');
    img.className = 'app-icon-img';
    img.alt = app.name;
    const cbName = 'itcb' + app.id;
    window[cbName] = function(d) { if (d.results && d.results[0]) img.src = d.results[0].artworkUrl60; };
    const s = document.createElement('script');
    s.src = 'https://itunes.apple.com/lookup?id=' + app.id + '&callback=' + cbName;
    document.body.appendChild(s);
    const name = document.createElement('div');
    name.className = 'app-icon-name';
    name.textContent = app.name;
    item.appendChild(img);
    item.appendChild(name);
    grid.appendChild(item);
  });
}

function setLang(l) {
  lang = l;
  localStorage.setItem('ac_lang', lang);
  updateLangUI();
  document.querySelectorAll('.lang-opt').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function saveSettingsData() {
  const dob = document.getElementById('s-dob').value;
  const time = document.getElementById('s-time').value || '12:00';
  const city = document.getElementById('s-city').value || 'Paris';
  if (!dob) return;
  const [year, month, day] = dob.split('-').map(Number);
  const [hour, minute] = time.split(':').map(Number);
  const sunIdx = getSunSignIndex(month, day);
  const planets = getPlanetPositions(year, month, day, sunIdx);
  const ascIdx = getAscendantIndex(hour, minute, sunIdx);
  planets.ascendant = ascIdx;
  profile = { dob, time, city, year, month, day, hour, minute, sunIdx, ascIdx, planets };
  localStorage.setItem('ac_profile', JSON.stringify(profile));
  showTab('theme');
}

function openExt(url) {
  if (CapacitorGlobal) window.open(url, '_system');
  else window.open(url, '_blank');
}

window.addEventListener('resize', () => {

});
